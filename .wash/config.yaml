version: 2.0.4

# Run `wash dev` (or `wash build`) from the repo root.
#
# As of M14 the project is a service+component pair (PLAN's
# wasmCloud service-tcp template):
#   - api-gateway   (component) — exports wasi:http, fresh per request
#   - csl-service   (service)   — exports wasi:cli/run, long-lived TCP
#                                  server holding the parsed corpus
#                                  + prebuilt search engine in RAM.
# The component connects to the service over loopback TCP (127.0.0.1:7878)
# whenever it needs to search the CSL.

build:
  command: bash tools/build-component.sh
  component_path: target/wasm32-wasip2/release/ocelaudit_api_gateway.wasm

dev:
  address: 127.0.0.1:8000
  service_file: target/wasm32-wasip2/release/ocelaudit-csl-service.wasm
  volumes:
    - host_path: ./.cache/ocelaudit-data
      guest_path: /data
