name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write
  attestations: write
  id-token: write

jobs:
  test:
    # Re-run the full CI matrix as a release-time gate. No artifacts get
    # published if this fails — fix forward on main with a patch bump.
    uses: ./.github/workflows/ci.yml

  publish:
    name: Publish components to GHCR
    needs: test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        component:
          - api-gateway
    steps:
      - uses: actions/checkout@v6

      - name: Setup wash
        uses: wasmCloud/setup-wash-action@main
        with:
          wash-version: v2.0.5

      - name: Setup cargo-auditable wrapper
        uses: wasmcloud/actions/setup-wash-cargo-auditable@main

      - name: Install wkg (standalone)
        run: |
          set -euo pipefail
          version=0.15.0
          arch=$(uname -m)
          case "$arch" in x86_64) target="x86_64-unknown-linux-gnu" ;;
                          aarch64|arm64) target="aarch64-unknown-linux-gnu" ;; esac
          curl -fsSL -o /usr/local/bin/wkg \
            "https://github.com/bytecodealliance/wasm-pkg-tools/releases/download/v${version}/wkg-${target}"
          chmod +x /usr/local/bin/wkg

      - run: rustup target add wasm32-wasip2

      - id: build
        uses: wasmcloud/actions/wash-build@main
        with:
          working-directory: components/${{ matrix.component }}

      - name: Publish to GHCR with SLSA attestation
        uses: wasmcloud/actions/wash-oci-publish@main
        with:
          component_path: ${{ steps.build.outputs.component_path }}
          registry: ghcr.io
          attestation: "true"
          image_tags: "latest,${{ github.ref_name }}"

  publish-csl-service:
    name: Publish csl-service to GHCR
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup wash
        uses: wasmCloud/setup-wash-action@main
        with:
          wash-version: v2.0.5

      - name: Setup cargo-auditable wrapper
        uses: wasmcloud/actions/setup-wash-cargo-auditable@main

      - run: rustup target add wasm32-wasip2

      # csl-service embeds the SPA bundle (ui/dist) at build time via its
      # build.rs (minus videos) to stage /data on first boot. ui/dist is a
      # gitignored build artifact, so build it BEFORE the cargo build — otherwise
      # the embedded SPA is empty and the app never leaves "booting".
      # Mirror ci.yml's SPA setup: pin pnpm via action-setup (not corepack,
      # whose latest pnpm needs Node >=22.13 / node:sqlite) on Node 22.
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: ui/pnpm-lock.yaml
      - name: Build the SPA (embedded by csl-service)
        run: |
          pnpm --dir ui install --frozen-lockfile
          pnpm --dir ui build

      # csl-service is a plain wstd wasip2 binary (no wit/ → not a `wash build`
      # component), so build it with cargo and hand the artifact to the publisher.
      - name: Build csl-service (cargo)
        run: cargo auditable build --target wasm32-wasip2 --release -p ocelaudit-csl-service

      # NOTE: we can't reuse wasmcloud/actions/wash-oci-publish here. That action
      # hardcodes the image name to ${GITHUB_REPOSITORY} (= cosmonic-labs/ocelaudit),
      # which is the api-gateway's image. The csl-service is a SEPARATE image
      # (ghcr.io/<owner>/ocelaudit-csl-service, per deploy/control/httptrigger.yaml);
      # using the action would push both pieces to the same ref and clobber.
      # So push the service to its own name explicitly + attest provenance.
      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Push csl-service to GHCR
        id: push
        env:
          IMAGE: ghcr.io/${{ github.repository_owner }}/ocelaudit-csl-service
          WASM: target/wasm32-wasip2/release/ocelaudit-csl-service.wasm
          REF_TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          # Lowercase the owner (GHCR requires lowercase repository paths).
          IMAGE="${IMAGE,,}"
          digest=""
          for tag in latest "$REF_TAG"; do
            echo ">> wash oci push $IMAGE:$tag"
            # Capture stdout (JSON) + stderr separately so a non-zero exit still
            # surfaces the real wash error instead of being swallowed by set -e.
            if ! out=$(wash oci push --output json "$IMAGE:$tag" "$WASM" 2>/tmp/wash.err); then
              echo "!! wash oci push failed for $tag" >&2
              echo "---- stderr ----" >&2; cat /tmp/wash.err >&2
              echo "---- stdout ----" >&2; echo "$out" >&2
              exit 1
            fi
            digest=$(echo "$out" | jq -r .data.digest)
            if [ -z "$digest" ] || [ "$digest" = "null" ]; then
              echo "!! failed to determine pushed digest for $tag" >&2
              echo "stderr:"; cat /tmp/wash.err >&2
              echo "stdout: $out" >&2
              exit 1
            fi
            echo "   pushed $IMAGE:$tag @ $digest"
          done
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"
          echo "digest=$digest" >> "$GITHUB_OUTPUT"

      - name: Attest csl-service provenance
        uses: actions/attest-build-provenance@96278af6caaf10aea03fd8d33a09a777ca52d62f # v3.2.0
        with:
          subject-name: ${{ steps.push.outputs.image }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

  release:
    name: Cut GitHub Release
    needs: [publish, publish-csl-service]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Generate release notes
        id: notes
        run: |
          prev=$(git describe --tags --abbrev=0 "${{ github.ref_name }}^" 2>/dev/null || echo "")
          {
            echo "body<<EOF"
            echo "## What changed"
            echo
            if [ -n "$prev" ]; then
              git log --pretty='format:- %s (%h)' "$prev..${{ github.ref_name }}"
            else
              git log --pretty='format:- %s (%h)'
            fi
            echo
            echo
            echo "## Verify"
            echo
            echo '```sh'
            echo 'gh attestation verify oci://ghcr.io/${{ github.repository_owner }}/ocelaudit-api-gateway:${{ github.ref_name }} \\'
            echo '  --owner ${{ github.repository_owner }}'
            echo '```'
            echo
            echo "## Caveats"
            echo
            echo "See [README.md](./README.md) for the full \"what's real, what's not\" list."
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - uses: softprops/action-gh-release@v2
        with:
          name: "OcelAudit ${{ github.ref_name }}"
          body: ${{ steps.notes.outputs.body }}
          generate_release_notes: false
          prerelease: ${{ startsWith(github.ref_name, 'v0.') }}
